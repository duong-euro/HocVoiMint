<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Vui học Toán 3 - Ứng dụng ôn tập Toán lớp 3 cho bé">
  <meta name="theme-color" content="#2563EB">
  <title>Vui học Toán 3</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Top Navbar -->
  <nav class="navbar" role="navigation" aria-label="Thanh điều hướng chính">
    <div class="navbar-logo" role="button" tabindex="0" aria-label="Về trang chủ">
      <svg viewBox="0 0 38 38" fill="none" aria-hidden="true">
        <rect width="38" height="38" rx="12" fill="url(#logoGrad)"/>
        <defs><linearGradient id="logoGrad" x1="0" y1="0" x2="38" y2="38"><stop stop-color="#3B82F6"/><stop offset="1" stop-color="#8B5CF6"/></linearGradient></defs>
        <text x="50%" y="56%" dominant-baseline="middle" text-anchor="middle"
              font-family="'Nunito', sans-serif" font-weight="900" font-size="16" fill="#FFFFFF">T3</text>
      </svg>
      <span>Vui học Toán</span>
    </div>
    <button class="btn-theme" id="btn-theme" type="button" aria-label="Đổi giao diện sáng/tối">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
  </nav>

  <!-- App Content -->
  <main id="app" role="main">
    <!-- Screens rendered by JS -->
  </main>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav" role="navigation" aria-label="Điều hướng chính">
    <button class="bottom-nav-item active" data-screen="home" type="button" aria-label="Trang chủ">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Trang chủ
    </button>
    <button class="bottom-nav-item" data-screen="topics" type="button" aria-label="Chủ đề">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
        <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
      </svg>
      Chủ đề
    </button>
    <button class="bottom-nav-item" data-screen="exams" type="button" aria-label="Đề thi">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
        <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
      </svg>
      Đề thi
    </button>
  </nav>

  <!-- Scripts -->
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
