<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Học Với Mint — Ôn tập Toán lớp 3 cho bé">
  <meta name="theme-color" content="#3B82F6">
  <title>Học Với Mint</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Top Navbar -->
  <nav class="navbar" role="navigation" aria-label="Thanh điều hướng">
    <div class="nav-logo" role="button" tabindex="0" aria-label="Về trang chủ">
      <svg viewBox="0 0 38 38" fill="none" aria-hidden="true" width="38" height="38">
        <rect width="38" height="38" rx="12" fill="url(#lg)"/>
        <defs><linearGradient id="lg" x1="0" y1="0" x2="38" y2="38"><stop stop-color="#3B82F6"/><stop offset="1" stop-color="#8B5CF6"/></linearGradient></defs>
        <text x="50%" y="56%" dominant-baseline="middle" text-anchor="middle" font-family="'Nunito',sans-serif" font-weight="900" font-size="11" fill="#FFF">Mint</text>
      </svg>
      <span>Học Với Mint</span>
    </div>
    <button class="btn-theme" id="btn-theme" type="button" aria-label="Đổi giao diện">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </nav>

  <!-- App -->
  <main id="app" role="main"></main>

  <!-- Bottom Nav — 4 tabs -->
  <nav class="bottom-nav" role="navigation" aria-label="Điều hướng chính">
    <button class="bnav-item active" data-nav="home" type="button" aria-label="Trang chủ">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Trang chủ
    </button>
    <button class="bnav-item" data-nav="learn" type="button" aria-label="Học">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      Học
    </button>
    <button class="bnav-item" data-nav="progress" type="button" aria-label="Tiến bộ">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Tiến bộ
    </button>
    <button class="bnav-item" data-nav="profile" type="button" aria-label="Hồ sơ">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Hồ sơ
    </button>
  </nav>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
